version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: library_db
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  auth_service:
    build: .
    command: python auth_service/auth_service.py
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db

  book_service:
    build: .
    command: python book_service/book_service.py
    ports:
      - "5002:5002"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db

  borrow_service:
    build: .
    command: python borrow_service/borrow_service.py
    ports:
      - "5003:5003"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db

    gateway:
    build: .
    command: python app.py
    ports:
      - "5000:5000"
    depends_on:
      auth_service:
        condition: service_started
      book_service:
        condition: service_started
      borrow_service:
        condition: service_started

volumes:
  mysql-data:
